<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MESAN SERVICIOS Ω — Eficiencia Industrial</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --bg: #000205;
            --omega-cyan: #00e5ff;
            --omega-cyan-glow: rgba(0, 229, 255, 0.4);
            --white: #ffffff;
            --muted: #94a3b8;
            --border: rgba(0, 229, 255, 0.2);
            --whatsapp: #25d366;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--white);
            font-family: 'DM Sans', sans-serif;
            background-image: radial-gradient(circle at 50% 10%, rgba(34, 211, 238, 0.15), transparent 50%);
            background-attachment: fixed;
        }
        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; text-align: center; }
        
        /* BOTÓN WHATSAPP FLOTANTE */
        .wsp-button {
            position: fixed; bottom: 30px; right: 30px;
            background: var(--whatsapp); width: 60px; height: 60px;
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            z-index: 1000; box-shadow: 0 0 20px rgba(37, 211, 102, 0.4);
            text-decoration: none; transition: 0.3s;
        }
        .wsp-button:hover { transform: scale(1.1); }

        .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; letter-spacing: 2px; }
        .logo span { color: var(--omega-cyan); }
        h1 { font-family: 'Syne', sans-serif; font-size: clamp(32px, 5vw, 54px); margin: 60px 0 20px; }
        h1 span { color: var(--omega-cyan); text-shadow: 0 0 15px var(--omega-cyan-glow); }
        
        .btn-solicitar {
            padding: 18px 50px; background: transparent; border: 1px solid var(--omega-cyan);
            color: var(--white); font-family: 'Syne', sans-serif; font-weight: 800;
            letter-spacing: 2px; cursor: pointer; transition: 0.3s; margin-bottom: 60px;
        }
        .btn-solicitar:hover { background: var(--omega-cyan); color: var(--bg); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(8px); }
        .modal-content { background: #080c14; border: 1px solid var(--omega-cyan); padding: 35px; border-radius: 15px; width: 95%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
        
        .field { text-align: left; margin-bottom: 12px; }
        label { font-size: 10px; color: var(--omega-cyan); text-transform: uppercase; display: block; margin-bottom: 4px; }
        .input-omega { width: 100%; padding: 10px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: white; border-radius: 5px; font-size: 14px; }
        
        .footer { margin-top: 60px; font-size: 12px; color: var(--muted); border-top: 1px solid var(--border); padding-top: 20px; }
        .footer a { color: var(--omega-cyan); text-decoration: none; }
    </style>
</head>
<body>

    <a href="https://wa.me/526861234567" class="wsp-button" target="_blank">
        <svg width="30" height="30" fill="white" viewBox="0 0 16 16"><path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/></svg>
    </a>

    <div class="container">
        <div class="logo">MESAN <span>SERVICIΩS</span></div>
        <h1>Eficiencia y Continuidad<br><span>Operativa</span> Industrial</h1>
        <button class="btn-solicitar" onclick="openModal()">SOLICITAR PROPUESTA Ω</button>

        <div class="footer">
            MESAN SERVICIOS © 2026 | <a href="mailto:contacto@mesanomega.com">contacto@mesanomega.com</a>
        </div>
    </div>

    <div class="modal" id="modalCotizador">
        <div class="modal-content">
            <h2 style="font-family:'Syne'; color:var(--omega-cyan); margin-bottom:20px; font-size:18px;">DATOS DE CONTACTO Ω</h2>
            
            <div class="field"><label>Nombre de la Empresa</label><input class="input-omega" id="empresa" required></div>
            <div class="field"><label>Correo Electrónico (Para CRM)</label><input class="input-omega" type="email" id="email" required></div>
            <div class="field"><label>Teléfono de Contacto</label><input class="input-omega" type="tel" id="telefono" required></div>
            <div class="field"><label>Metros Cuadrados (m²)</label><input class="input-omega" type="number" id="metros"></div>
            
            <div class="field">
                <label>Zona / IVA</label>
                <select class="input-omega" id="zona">
                    <option value="0.08">Mexicali / Frontera (8%)</option>
                    <option value="0.16">Interior del País (16%)</option>
                </select>
            </div>

            <div class="field">
                <label>Giro Industrial</label>
                <select class="input-omega" id="giro">
                    <option value="industrial">General / Industrial</option>
                    <option value="hospital">Hospitalario / Clínico</option>
                </select>
            </div>

            <button class="btn-solicitar" style="width:100%; margin-top:10px; border-color:var(--omega-cyan);" onclick="generarPDF()">GENERAR PROPUESTA</button>
            <p style="font-size:10px; color:var(--muted); margin-top:15px; cursor:pointer;" onclick="closeModal()">[ CANCELAR ]</p>
        </div>
    </div>

    <script>
        function openModal() { document.getElementById('modalCotizador').style.display = 'flex'; }
        function closeModal() { document.getElementById('modalCotizador').style.display = 'none'; }

        function generarPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            // Captura de datos
            const empresa = document.getElementById('empresa').value || "Cliente";
            const correo = document.getElementById('email').value;
            const tel = document.getElementById('telefono').value;
            const m2 = document.getElementById('metros').value;
            const ivaVal = parseFloat(document.getElementById('zona').value);
            
            // Lógica de cálculo competitiva
            const costoBase = (ivaVal === 0.08) ? 22500 : 13410;
            const total = costoBase * (1 + ivaVal);

            // Estética del PDF
            doc.setFillColor(0, 2, 5); doc.rect(0, 0, 210, 297, 'F');
            doc.setTextColor(0, 229, 255); doc.setFontSize(20);
            doc.text("MESAN SERVICIOS Ω", 20, 30);
            
            doc.setTextColor(255); doc.setFontSize(10);
            doc.text(`EMPRESA: ${empresa.toUpperCase()}`, 20, 50);
            doc.text(`CONTACTO: ${correo}`, 20, 55);
            doc.text(`TELÉFONO: ${tel}`, 20, 60);
            doc.text(`M2 REGISTRADOS: ${m2}m2`, 20, 65);

            doc.setDrawColor(0, 229, 255); doc.line(20, 75, 190, 75);

            doc.setTextColor(0, 229, 255); doc.setFontSize(14);
            doc.text("PROPUESTA DE INVERSIÓN MENSUAL", 20, 90);
            
            doc.setTextColor(255); doc.setFontSize(12);
            doc.text(`SUBTOTAL: $${costoBase.toLocaleString()}`, 20, 105);
            doc.text(`IVA (${ivaVal*100}%): $${(costoBase*ivaVal).toLocaleString()}`, 20, 112);
            doc.text(`TOTAL NETO: $${total.toLocaleString()}`, 20, 125);

            doc.setTextColor(150); doc.setFontSize(9);
            doc.text("Contacto: contacto@mesanomega.com", 20, 150);
            doc.text("Lic. Manuel Sánchez - Dirección General", 20, 160);

            doc.save(`Propuesta_MESAN_${empresa}.pdf`);
            
            // Simulación de envío a CRM
            console.log("Datos enviados al CRM:", { empresa, correo, tel, m2 });
            
            closeModal();
        }
    </script>
</body>
</html>
