<style>

:root{
    --bg:#020617;
    --card:#0f172a;
    --cyan:#00e5ff;
    --text:#ffffff;
    --muted:#94a3b8;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:'DM Sans',sans-serif;
}

header{
    padding:80px 20px 40px;
    text-align:center;
}

header h1{
    font-family:'Syne',sans-serif;
    font-size:46px;
    color:var(--cyan);
    margin-bottom:18px;
}

header p{
    max-width:800px;
    margin:auto;
    color:var(--muted);
    line-height:1.7;
}

.grid{
    width:95%;
    max-width:1200px;
    margin:40px auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:24px;
}

.card{
    background:var(--card);
    border-radius:18px;
    padding:28px;
    border:1px solid rgba(255,255,255,.05);
}

.card h2{
    color:var(--cyan);
    font-family:'Syne',sans-serif;
    margin-bottom:14px;
}

.card p{
    color:var(--muted);
    line-height:1.7;
    margin-bottom:20px;
}

.btn{
    display:block;
    width:100%;
    padding:14px;
    text-align:center;
    background:var(--cyan);
    color:black;
    text-decoration:none;
    border-radius:10px;
    font-family:'Syne',sans-serif;
    font-weight:800;
}

.contacto{
    width:95%;
    max-width:1000px;
    margin:50px auto;
    background:#0f172a;
    border-radius:20px;
    padding:34px;
    text-align:center;
}

.contacto h3{
    color:var(--cyan);
    font-family:'Syne',sans-serif;
    margin-bottom:14px;
}

.contacto p{
    color:var(--muted);
    margin-bottom:20px;
}

footer{
    padding:50px 20px;
    text-align:center;
    color:var(--muted);
    font-size:14px;
}

</style>

</head>
