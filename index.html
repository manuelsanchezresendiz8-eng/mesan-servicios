<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MESAN Servicios — Continuidad Operativa</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
--bg:#020617;
--cyan:#22D3EE;
--white:#eef4ff;
--muted:#6b7a99;
--border:rgba(34,211,238,0.15);
}

*{margin:0;padding:0;box-sizing:border-box}
body{
background:var(--bg);
color:var(--white);
font-family:'DM Sans',sans-serif;
}

/* FONDO */
body::before{
content:'';
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 30%, rgba(34,211,238,0.15), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(34,211,238,0.1), transparent 40%);
z-index:0;
}

/* CONTENEDOR */
.wrapper{
position:relative;
z-index:1;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

/* CARD */
.card{
width:100%;
max-width:420px;
background:rgba(255,255,255,0.03);
border:1px solid var(--border);
border-radius:22px;
padding:28px;
box-shadow:0 0 80px rgba(34,211,238,0.08);
backdrop-filter:blur(20px);
}

/* HEADER */
.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.logo{
font-family:'Syne',sans-serif;
font-weight:800;
font-size:14px;
letter-spacing:2px;
}

.tag{
font-size:10px;
color:var(--muted);
letter-spacing:2px;
}

/* TITULO */
h1{
font-family:'Syne',sans-serif;
font-size:26px;
font-weight:800;
line-height:1.2;
margin-bottom:16px;
}

h1 span{
color:var(--cyan);
}

/* TEXTO */
.desc{
font-size:13px;
color:var(--muted);
line-height:1.6;
margin-bottom:20px;
}

/* FORM */
.input{
width:100%;
padding:12px;
margin-bottom:10px;
background:rgba(255,255,255,0.05);
border:1px solid var(--border);
border-radius:10px;
color:white;
}

/* BOTÓN */
.btn{
width:100%;
padding:14px;
border:1px solid var(--cyan);
background:transparent;
color:var(--cyan);
font-family:'Syne',sans-serif;
font-size:12px;
letter-spacing:2px;
cursor:pointer;
transition:0.3s;
margin-top:10px;
}

.btn:hover{
background:rgba(34,211,238,0.1);
box-shadow:0 0 25px rgba(34,211,238,0.2);
}

/* SERVICIOS */
.services{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
margin-top:20px;
}

.service{
background:rgba(255,255,255,0.02);
border:1px solid rgba(255,255,255,0.05);
padding:12px;
border-radius:10px;
font-size:10px;
color:var(--muted);
text-align:center;
}

/* STATUS */
.status{
font-size:11px;
margin-top:10px;
color:var(--cyan);
text-align:center;
display:none;
}

/* FOOTER */
.footer{
text-align:center;
font-size:10px;
color:rgba(255,255,255,0.2);
margin-top:16px;
letter-spacing:2px;
}
</style>
</head>

<body>

<div class="wrapper">
  <div class="card">

    <!-- HEADER -->
    <div class="top">
      <div class="logo">MESAN SERVICIOS</div>
      <div class="tag">PREVENTIVO Y CORRECTIVO</div>
    </div>

    <!-- TITULO -->
    <h1>
      Eficiencia y Continuidad<br>
      <span>Operativa Industrial</span>
    </h1>

    <!-- TEXTO -->
    <p class="desc">
      Genera tu cotización en segundos con nuestro motor financiero.
    </p>

    <!-- FORM -->
    <input class="input" id="empresa" placeholder="Nombre de empresa">
    <input class="input" id="elementos" type="number" placeholder="Número de elementos">
    
    <select class="input" id="zona">
      <option value="frontera">Frontera</option>
      <option value="interior">Interior</option>
    </select>

    <select class="input" id="tipo">
      <option value="limpieza">Limpieza</option>
      <option value="mantenimiento">Mantenimiento</option>
    </select>

    <!-- BOTÓN -->
    <button class="btn" onclick="cotizar()" id="btn">
      GENERAR COTIZACIÓN
    </button>

    <div class="status" id="status">Generando PDF...</div>

    <!-- SERVICIOS -->
    <div class="services">
      <div class="service">Mantenimiento</div>
      <div class="service">Limpieza</div>
      <div class="service">Insumos</div>
    </div>

    <div class="footer">
      MESAN SERVICIOS © 2026
    </div>

  </div>
</div>

<script>
const API = "https://mesan-servicios.onrender.com";

async function cotizar(){

  const empresa = document.getElementById("empresa").value || "Cliente";
  const elementos = document.getElementById("elementos").value;
  const zona = document.getElementById("zona").value;
  const tipo = document.getElementById("tipo").value;

  if(!elementos){
    alert("Ingresa número de elementos");
    return;
  }

  const btn = document.getElementById("btn");
  const status = document.getElementById("status");

  btn.disabled = true;
  status.style.display = "block";

  try{
    const res = await fetch(API + "/cotizar", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({empresa, elementos, zona, tipo})
    });

    const blob = await res.blob();

    const url = window.URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "Cotizacion_MESAN.pdf";
    a.click();

    // WhatsApp automático
    const msg = encodeURIComponent(
      `Ya generé mi cotización MESAN.\nEmpresa: ${empresa}\nElementos: ${elementos}\nZona: ${zona}\nQuiero activarla.`
    );

    window.open("https://wa.me/526861629643?text=" + msg, "_blank");

    status.innerText = "Cotización generada ✔";

  }catch(e){
    alert("Error generando cotización");
  }

  btn.disabled = false;
}
</script>

</body>
</html>
