<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cotizador — MESAN</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { border: 1px solid #00f2ff; padding: 40px; background: rgba(0,0,0,0.8); width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; background: #111; border: 1px solid #333; color: white; box-sizing: border-box; }
        .btn-pdf { width: 100%; padding: 15px; background: #00f2ff; color: black; border: none; font-weight: bold; cursor: pointer; font-family: sans-serif; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color:#00f2ff">PROPUESTA DE SERVICIO</h2>
        <input type="text" id="empresa" placeholder="Nombre de la Empresa">
        <input type="number" id="m2" placeholder="Metros Cuadrados">
        <button class="btn-pdf" onclick="descargarPDF()">GENERAR PROPUESTA PDF</button>
    </div>

    <script>
        function descargarPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const empresa = document.getElementById('empresa').value || "CLIENTE";
            
            doc.setFillColor(2, 6, 23); doc.rect(0, 0, 210, 297, 'F'); // Fondo oscuro
            doc.setTextColor(0, 242, 255); doc.setFontSize(24);
            doc.text("MESAN SERVICIOS", 20, 30);
            
            doc.setTextColor(255, 255, 255); doc.setFontSize(14);
            doc.text(`PROPUESTA PARA: ${empresa}`, 20, 50);
            doc.text(`CONCEPTO: Limpieza Especializada Industrial`, 20, 60);
            doc.text(`METRAJE: ${document.getElementById('m2').value} m2`, 20, 70);
            
            doc.text("_______________________________________", 20, 100);
            doc.text("Emitido por: Lic. Manuel Sánchez", 20, 110);
            doc.text("Director General - Mexicali, B.C.", 20, 120);

            doc.save(`Propuesta_MESAN_${empresa}.pdf`);
        }
    </script>
</body>
</html>
