<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MESAN Servicios Ω | Sistema de Cotización</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .electric-cyan { color: #38BDF8; }
        .bg-cyan-glow { background: rgba(56, 189, 248, 0.1); border: 1px solid #38BDF8; }
        .btn-predictive { background: #38BDF8; color: #000; font-weight: 900; transition: 0.3s; }
        .btn-predictive:hover { box-shadow: 0 0 20px #38BDF8; }
    </style>
</head>
<body class="p-6 flex justify-center">
    <div class="max-w-md w-full space-y-8">
        <div class="text-center">
            <h1 class="text-2xl font-bold tracking-tighter">MESAN <span class="electric-cyan">SERVICIOS Ω</span></h1>
            <p class="text-[10px] text-gray-500 uppercase tracking-widest">Servicio Preventivo y Correctivo</p>
        </div>

        <div class="bg-cyan-glow p-6 rounded-2xl space-y-4">
            <h2 class="text-xl font-extrabold text-center">Eficiencia y Continuidad <br><span class="electric-cyan">Operativa Industrial</span></h2>
            
            <div class="space-y-3 pt-4">
                <input type="text" id="cliente" placeholder="Nombre del Contacto (ej. Laura)" class="w-full bg-black border border-gray-700 p-3 rounded text-sm">
                <input type="email" id="email" placeholder="bledsoe_1818@hotmail.com" class="w-full bg-black border border-gray-700 p-3 rounded text-sm">
                
                <select id="servicio" class="w-full bg-black border border-gray-700 p-3 rounded text-sm">
                    <option value="limpieza">Limpieza Especializada (Grado Industrial STPS)</option>
                    <option value="mantenimiento">Mantenimiento Técnico Preventivo</option>
                    <option value="repse">Cumplimiento REPSE / Blindaje Legal</option>
                </select>

                <div class="grid grid-cols-2 gap-2">
                    <input type="number" id="m2" placeholder="m² (ej. 450)" class="w-full bg-black border border-gray-700 p-3 rounded text-sm">
                    <input type="number" id="turnos" placeholder="Turnos (ej. 1)" class="w-full bg-black border border-gray-700 p-3 rounded text-sm">
                </div>
            </div>

            <button onclick="dispararCotizacion()" class="w-full btn-predictive py-4 rounded-full uppercase text-xs tracking-widest">
                Generar Propuesta PDF
            </button>
        </div>
    </div>

    <script>
        async function dispararCotizacion() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            const cliente = document.getElementById('cliente').value || "Cliente";
            const servicio = document.getElementById('servicio').value;
            const m2 = document.getElementById('m2').value || "0";

            // DISEÑO DEL PDF (Fondo Negro / Letras Cian)
            doc.setFillColor(0, 0, 0);
            doc.rect(0, 0, 210, 297, 'F');
            
            doc.setTextColor(56, 189, 248);
            doc.setFontSize(22);
            doc.text("MESAN SERVICIOS", 20, 30);
            
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(14);
            doc.text(`ATN: ${cliente}`, 20, 50);
            
            // LEYENDA ESPECÍFICA DE LIMPIEZA
            if(servicio === 'limpieza') {
                doc.setFontSize(16);
                doc.setTextColor(56, 189, 248);
                doc.text("PROPUESTA DE LIMPIEZA ESPECIALIZADA", 20, 70);
                doc.setFontSize(11);
                doc.setTextColor(255, 255, 255);
                doc.text([
                    "Sistemas de limpieza avanzada bajo normas de inocuidad STPS.",
                    `Área de cobertura: ${m2} metros cuadrados.`,
                    "Garantía de operación continua y cumplimiento normativo.",
                    "",
                    "INCLUYE:",
                    "- Sanitización de grado industrial.",
                    "- Gestión de insumos con control de costos.",
                    "- Personal capacitado con registro REPSE vigente."
                ], 20, 85);
            }

            doc.save(`Cotizacion_Mesan_${cliente}.pdf`);
        }
    </script>
</body>
</html>
