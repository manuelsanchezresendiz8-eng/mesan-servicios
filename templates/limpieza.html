<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cotización Limpieza | MESAN Servicios</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#050816;
    color:white;
    font-family:'DM Sans',sans-serif;
    padding:40px 8%;
}

.container{
    max-width:900px;
    margin:auto;
}

.title{
    text-align:center;
    margin-bottom:50px;
}

.title h1{
    font-family:'Syne',sans-serif;
    font-size:3rem;
    margin-bottom:15px;
}

.title span{
    color:#00ffff;
}

.title p{
    color:#cbd5e1;
}

form{
    background:#0b1120;
    padding:40px;
    border-radius:24px;
    border:1px solid rgba(0,255,255,.1);
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:22px;
}

.field{
    display:flex;
    flex-direction:column;
}

label{
    margin-bottom:10px;
    color:#94a3b8;
}

input,
select,
textarea{
    background:#111827;
    border:1px solid rgba(255,255,255,.08);
    color:white;
    padding:15px;
    border-radius:12px;
    outline:none;
}

textarea{
    min-height:120px;
    resize:none;
}

button{
    width:100%;
    margin-top:30px;
    padding:18px;
    border:none;
    border-radius:14px;
    background:#00ffff;
    color:#050816;
    font-weight:700;
    font-size:1rem;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 0 25px #00ffff55;
}

.notice{
    margin-top:25px;
    color:#94a3b8;
    text-align:center;
    font-size:.95rem;
}

.back{
    display:inline-block;
    margin-bottom:35px;
    color:#00ffff;
    text-decoration:none;
}

@media(max-width:768px){

.title h1{
    font-size:2.3rem;
}

form{
    padding:28px;
}

}

</style>
</head>

<body>

<div class="container">

<a href="/" class="back">
← Volver al inicio
</a>

<div class="title">

<h1>
Cotización de <span>Limpieza Profesional</span>
</h1>

<p>
Completa el formulario y nuestro sistema preparará una propuesta operativa MESAN.
</p>

</div>

<form action="/cotizar" method="POST">

<div class="grid">

<div class="field">
<label>Nombre completo</label>
<input type="text" name="nombre" required>
</div>

<div class="field">
<label>Empresa</label>
<input type="text" name="empresa" required>
</div>

<div class="field">
<label>Teléfono</label>
<input type="text" name="telefono" required>
</div>

<div class="field">
<label>Correo electrónico</label>
<input type="email" name="correo" required>
</div>

<div class="field">
<label>Ciudad</label>
<input type="text" name="ciudad" required>
</div>

<div class="field">
<label>Tipo de inmueble</label>

<select name="inmueble" required>
<option value="">Seleccionar</option>
<option>Oficina</option>
<option>Escuela</option>
<option>Hospital</option>
<option>Industria</option>
<option>Corporativo</option>
<option>Otro</option>
</select>

</div>

<div class="field">
<label>Metros cuadrados aproximados</label>
<input type="number" name="metros" required>
</div>

<div class="field">
<label>Frecuencia requerida</label>

<select name="frecuencia" required>
<option value="">Seleccionar</option>
<option>Diario</option>
<option>3 veces por semana</option>
<option>Semanal</option>
<option>Quincenal</option>
<option>Mensual</option>
</select>

</div>

<div class="field">
<label>Tipo de servicio</label>

<select name="servicio" required>
<option value="">Seleccionar</option>
<option>Limpieza básica</option>
<option>Limpieza profunda</option>
<option>Limpieza hospitalaria</option>
<option>Limpieza industrial</option>
</select>

</div>

<div class="field">
<label>Horario operativo</label>

<select name="horario" required>
<option value="">Seleccionar</option>
<option>Matutino</option>
<option>Vespertino</option>
<option>Nocturno</option>
<option>24 horas</option>
</select>

</div>

</div>

<div class="field" style="margin-top:25px;">

<label>Observaciones adicionales</label>

<textarea
name="comentarios"
placeholder="Describe necesidades especiales, accesos, áreas críticas o requerimientos operativos."
></textarea>

</div>

<button type="submit">
Generar Cotización MESAN
</button>

<div class="notice">

Al enviar este formulario aceptas el tratamiento de datos conforme al aviso de privacidad MESAN Servicios.

</div>

</form>

</div>

</body>
</html>
