<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM | MESAN Servicios</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{ --bg:#020617; --cyan:#00e5ff; --muted:#94a3b8; }
*{ margin:0; padding:0; box-sizing:border-box; }
body{ background:var(--bg); color:white; font-family:'DM Sans',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; }
.box{ background:#08101d; border:1px solid rgba(0,229,255,.2); border-radius:20px; padding:40px 32px; width:95%; max-width:380px; text-align:center; }
.box h1{ font-family:'Syne',sans-serif; font-size:22px; color:var(--cyan); margin-bottom:6px; }
.box p{ color:var(--muted); font-size:12px; margin-bottom:28px; }
.inp{ width:100%; padding:12px 16px; background:#0f172a; border:1px solid rgba(0,229,255,.15); color:white; border-radius:10px; font-size:14px; outline:none; box-sizing:border-box; text-align:center; letter-spacing:.1em; margin-bottom:14px; }
.btn{ width:100%; padding:14px; background:var(--cyan); border:none; border-radius:10px; font-family:'Syne',sans-serif; font-weight:800; font-size:13px; letter-spacing:.08em; cursor:pointer; }
.error{ color:#f87171; font-size:12px; margin-bottom:12px; }
</style>
</head>
<body>
<div class="box">
  <h1>CRM MESAN</h1>
  <p>Acceso restringido — solo personal autorizado</p>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  <form method="POST" action="/crm">
    <input class="inp" type="password" name="password" placeholder="Contraseña" autofocus>
    <button class="btn" type="submit">INGRESAR →</button>
  </form>
</div>
</body>
</html>
