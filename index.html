<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MESAN SERVICIOS - CEO PREMIER</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --cyan-glow: #4db8ff;
            --deep-navy: #020812;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--deep-navy);
            /* FONDO MULTICAPA: Nebulosa, Estrellas y Brillo Superior */
            background-image: 
                radial-gradient(circle at 50% -10%, rgba(77, 184, 255, 0.3) 0%, transparent 40%),
                radial-gradient(circle at 20% 30%, rgba(10, 40, 80, 0.4) 0%, transparent 50%),
                url('https://www.transparenttextures.com/patterns/stardust.png');
            background-attachment: fixed;
            color: #ffffff;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .phone-container {
            width: 100%;
            max-width: 412px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* HEADER EXACTO */
        .header-ui {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.7rem;
            text-transform: lowercase;
            opacity: 0.8;
            letter-spacing: 1px;
            margin-bottom: 30px;
        }

        .dots { letter-spacing: 3px; font-weight: bold; }

        /* LOGO CON "SERVICIO PREVENTIVO..." */
        .brand-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
        }

        .logo {
            font-weight: 800;
            font-size: 0.9rem;
            letter-spacing: 2px;
        }

        .logo span { color: #8899ac; font-weight: 400; margin-left: 5px; }

        .tagline {
            font-size: 0.5rem;
            color: #5d6d7e;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* TITULO CON DEGRADADO AZULADO */
        .hero-title {
            text-align: center;
            font-size: 2.4rem;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 25px;
        }

        .hero-title span {
            background: linear-gradient(180deg, #7ad3ff 0%, #4db8ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: block;
        }

        .hero-desc {
            text-align: center;
            font-size: 0.85rem;
            color: #8a99a8;
            line-height: 1.6;
            margin-bottom: 45px;
            padding: 0 10px;
        }

        /* BOTÓN CON BORDE DE CRISTAL */
        .btn-solicitar {
            width: 100%;
            background: rgba(77, 184, 255, 0.03);
            border: 1px solid rgba(77, 184, 255, 0.3);
            color: #ffffff;
            padding: 18px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            margin-bottom: 60px;
            backdrop-filter: blur(5px);
        }

        /* GRID DE TARJETAS */
        .services-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 4px;
            padding: 15px 10px;
            backdrop-filter: blur(10px);
        }

        .card i {
            color: #4db8ff;
            font-size: 1.2rem;
            margin-bottom: 12px;
            opacity: 0.7;
        }

        .card h3 {
            font-size: 0.6rem;
            text-transform: uppercase;
            margin: 0 0 5px 0;
            line-height: 1.2;
            color: #d1d9e0;
        }

        .card p {
            font-size: 0.5rem;
            color: #6a7783;
            margin: 0;
            line-height: 1.3;
        }

        .footer-text {
            text-align: center;
            margin-top: 50px;
            font-size: 0.55rem;
            color: #4a5568;
            letter-spacing: 2px;
        }

        /* ESTRELLA DE LA ESQUINA */
        .flare {
            position: absolute;
            bottom: 40px;
            right: 20px;
            color: #ffffff;
            opacity: 0.5;
            font-size: 1.2rem;
