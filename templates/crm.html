<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MESAN Ω - CRM CONTROL</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; color: #00f2ff; font-family: sans-serif; padding: 20px; }
        .header-crm { border-bottom: 2px solid #00f2ff; padding-bottom: 10px; margin-bottom: 30px; }
        h2 { font-family: 'Syncopate', sans-serif; letter-spacing: 2px; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-box { border: 1px solid #00f2ff; padding: 20px; text-align: center; background: rgba(0, 242, 255, 0.05); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #333; padding: 15px; text-align: left; }
        th { background: #111; color: #00f2ff; font-family: 'Syncopate', sans-serif; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="header-crm"><h2>CENTRO DE CONTROL CRM</h2></div>
    <div class="stats-grid">
        <div class="stat-box"><h1>12</h1><p>CLIENTES ACTIVOS</p></div>
        <div class="stat-box"><h1>85%</h1><p>EFICIENCIA</p></div>
        <div class="stat-box"><h1>$0.00</h1><p>PENDIENTE</p></div>
    </div>
    <table>
        <thead><tr><th>PROYECTO</th><th>CLIENTE</th><th>ESTADO</th></tr></thead>
        <tbody><tr><td>Mantenimiento Planta A</td><td>Industrial Mexicali</td><td>EJECUTANDO</td></tr></tbody>
    </table>
</body>
</html>
