<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MESAN OMEGA — Cotizador Industrial Frontera/Interior</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root {
    --bg: #000205;
    --omega-cyan: #00e5ff;
    --omega-cyan-glow: rgba(0, 229, 255, 0.4);
    --white: #ffffff;
    --muted: #94a3b8;
    --border: rgba(0, 229, 255, 0.2);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: var(--bg);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    background-image: radial-gradient(circle at 50% 10%, rgba(34, 211, 238, 0.1), transparent 50%);
}

.container {
    max-width: 1000px;
    margin: 0 auto;
    padding: 60px 20px;
    text-align: center;
}

.header {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 60px;
}

.logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; letter-spacing: 2px; }
.logo span { color: var(--omega-cyan); }

h1 { font-family: 'Syne', sans-serif; font-size: clamp(30px, 5vw, 60px); margin-bottom: 20px; line-height: 1.1; }
h1 span { color: var(--omega-cyan); text-shadow: 0 0 20px var(--omega-cyan-glow); }

.btn-main {
    padding: 20px 50px;
    border: 1px solid var(--omega-cyan);
    background: transparent;
    color: var(--white);
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    letter-spacing: 3px;
    cursor: pointer;
    transition: 0.4s;
}

.btn-main:hover {
    background: var(--omega-cyan);
    color: var(--bg);
    box-shadow: 0 0 30px var(--omega-cyan-glow);
}

/* MODAL */
.modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    backdrop-filter: blur(10px);
}

.modal-content {
    background: #050a14;
    border: 1px solid var(--omega-cyan);
    padding: 35px;
    border-radius: 20px;
    width: 100%;
    max-width: 480px;
    position: relative;
}

.input-group { text-align: left; margin-bottom: 15px; }
label { font-size: 11px; color: var(--omega-cyan); text-transform: uppercase; display: block; margin-bottom: 5px; }

.input-omega {
    width: 100%;
    padding: 12px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: white;
}

.btn-vertical {
    width: 100%;
    padding: 15px;
    margin-top: 10px;
    background: transparent;
    border: 1px solid var(--omega-cyan);
    color: var(--omega-cyan);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    cursor: pointer;
}

.btn-vertical:hover { background: var(--omega-cyan-glow); color: white; }

</style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo">MESAN <span>Ω</span></div>
        <div style="font-size: 10px; color: var(--muted); text-align: right;">LOGÍSTICA OPERATIVA<br>NIVEL INDUSTRIAL</div>
    </div>

    <h1>Eficiencia y<span> Continuidad</span><br>Operativa Hospitalaria</h1>
    
    <p style="color: var(--muted); margin-bottom: 40px; max-width: 600px; margin-inline: auto;">
        Motor financiero MESAN Ω: Cotización instantánea con algoritmos de flujo para Hospitales, Escuelas e Industrias.
    </p>

    <button class="btn-main" onclick="toggleModal(true)">INICIAR COTIZADOR Ω</button>
</div>

<div class="modal-overlay" id="modalCotizador">
    <div class="modal-content">
        <h2 style="font-family:'Syne'; margin-bottom: 20px;">COTIZACIÓN FORMAL</h2>
        
        <div class="input-group">
            <label>Empresa / Institución</label>
            <input class="input-omega" id="empresa" placeholder="Nombre del cliente">
        </div>

        <div class="input-group">
            <label>Área a cubrir (m²)</label>
            <input class="input-omega" id="metros" type="number" placeholder="Ej. 2500">
        </div>

        <div class="input-group">
            <label>Zona Fiscal</label>
            <select class="input-omega" id="zona">
                <option value="0.08">Frontera (IVA 8%)</option>
                <option value="0.16">Interior del País (IVA 16%)</option>
            </select>
        </div>

        <div class="input-group">
            <label>Tipo de Inmueble (Flujo)</label>
            <select class="input-omega" id="flujo">
                <option value="hospital">Hospital / Clínica (Flujo Crítico)</option>
                <option value="escuela">Escuela / Universidad (Flujo Alto)</option>
                <option value="industria">Industria / Almacén (Flujo Técnico)</option>
                <option value="oficina">Oficinas Corporativas (Flujo Medio)</option>
            </select>
        </div>

        <div class="input-group">
            <label>Turnos Requeridos</label>
            <select class="input-omega" id="turnos">
                <option value="1">1 Turno (8 hrs)</option>
                <option value="2">2 Turnos (16 hrs)</option>
                <option value="3">3 Turnos (24 hrs - Continuo)</option>
            </select>
        </div>

        <button class="btn-vertical" onclick="procesarCotizacion()">GENERAR PROPUESTA PDF</button>
        <button class="btn-vertical" style="border-color: #333; color: #666;" onclick="toggleModal(false)">CANCELAR</button>
    </div>
</div>

<script>
function toggleModal(show) {
    document.getElementById('modalCotizador').style.display = show ? 'flex' : 'none';
}

function procesarCotizacion() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    
    const empresa = document.getElementById('empresa').value || "CLIENTE";
    const metros = parseInt(document.getElementById('metros').value) || 0;
    const tasaIva = parseFloat(document.getElementById('zona').value);
    const tipoFlujo = document.getElementById('flujo').value;
    const turnos = parseInt(document.getElementById('turnos').value);

    // LÓGICA OMEGA DE CÁLCULO
    let factorPersonal = 200; // m2 por persona base
    if(tipoFlujo === 'hospital') factorPersonal = 100;
    if(tipoFlujo === 'escuela') factorPersonal = 150;

    const personalBase = Math.ceil(metros / factorPersonal);
    const personalTotal = personalBase * turnos;
    
    // Salarios mínimos ajustados a la visión de Manuel (21k frontera prom)
    const costoMensualPersona = tasaIva === 0.08 ? 16500 : 14500; 
    const subtotal = (personalTotal * costoMensualPersona) * 1.35; // 35% margen operativo/ganancia
    const iva = subtotal * tasaIva;
    const total = subtotal + iva;

    // GENERACIÓN DE PDF
    doc.setFillColor(10, 15, 25);
    doc.rect(0, 0, 210, 297, 'F');

    doc.setTextColor(0, 229, 255);
    doc.setFontSize(18);
    doc.text("MESAN SERVICIOS Ω", 20, 20);
    
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(10);
    doc.text("COTIZACIÓN FORMAL DE SERVICIOS INDUSTRIALES", 20, 30);
    doc.text(`ATN: LIC. MANUEL SÁNCHEZ`, 140, 20);

    doc.setDrawColor(0, 229, 255);
    doc.line(20, 35, 190, 35);

    // Detalles del Cliente
    doc.text(`CLIENTE: ${empresa.toUpperCase()}`, 20, 50);
    doc.text(`TIPO DE SERVICIO: MANTENIMIENTO Y LIMPIEZA (${tipoFlujo.toUpperCase()})`, 20, 60);
    doc.text(`COBERTURA: ${metros} m2 / ${turnos} TURNOS`, 20, 70);

    // Cuadro de Costos
    doc.setFillColor(20, 25, 35);
    doc.rect(20, 85, 170, 60, 'F');
    
    doc.text("DESGLOSE FINANCIERO:", 30, 100);
    doc.text(`SUBTOTAL MENSUAL:`, 30, 115);
    doc.text(`$ ${subtotal.toLocaleString('es-MX', {minimumFractionDigits: 2})}`, 130, 115);
    
    doc.text(`IVA (${tasaIva * 100}%):`, 30, 125);
    doc.text(`$ ${iva.toLocaleString('es-MX', {minimumFractionDigits: 2})}`, 130, 125);
    
    doc.setFontSize(14);
    doc.setTextColor(0, 229, 255);
    doc.text(`TOTAL NETO:`, 30, 140);
    doc.text(`$ ${total.toLocaleString('es-MX', {minimumFractionDigits: 2})}`, 130, 140);

    // Instrucciones de Facturación
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(9);
    doc.text("CONDICIONES COMERCIALES:", 20, 160);
    doc.text("1. Los pagos se realizarán exclusivamente vía TRANSFERENCIA BANCARIA.", 20, 170);
    doc.text("2. Favor de enviar CONSTANCIA DE SITUACIÓN FISCAL actualizada para facturación.", 20, 180);
    doc.text(`3. Aplicación de IVA al ${tasaIva * 100}% según zona geográfica detectada.`, 20, 190);
    
    doc.setFontSize(8);
    doc.setTextColor(150, 150, 150);
    doc.text("MESAN Ω - Mexicali, B.C. | Ciudad de México", 20, 270);

    doc.save(`Cotizacion_MESAN_Omega_${empresa}.pdf`);
    toggleModal(false);
}
</script>

</body>
</html>
