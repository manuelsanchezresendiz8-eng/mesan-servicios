<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MESAN Servicios — CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#000205;--card:#0a0f18;--cyan:#00e5ff;
  --cyan-glow:rgba(0,229,255,0.2);--white:#fff;
  --muted:#94a3b8;--danger:#ff3b3b;--green:#22c55e;
  --orange:#f97316;--border:rgba(0,229,255,0.15);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--white);font-family:'DM Sans',sans-serif;padding:20px;min-height:100vh}

/* HEADER */
.header{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);padding-bottom:15px;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.logo{font-family:'Syne',sans-serif;font-size:14px;letter-spacing:2px;color:var(--cyan)}
.tabs{display:flex;gap:8px;flex-wrap:wrap}
.tab{padding:7px 14px;border:1px solid var(--cyan);font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--cyan);cursor:pointer;border-radius:3px;transition:.2s}
.tab.active,.tab:hover{background:var(--cyan);color:var(--bg)}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat{background:var(--card);border:1px solid var(--border);padding:16px;text-align:center;border-radius:6px}
.stat-val{font-size:24px;font-family:'Syne',sans-serif;margin-bottom:4px}
.stat-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}

/* FILTROS */
.filtros{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
.fbtn{padding:6px 12px;border:1px solid var(--border);font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);cursor:pointer;border-radius:3px;background:transparent;transition:.2s}
.fbtn.active,.fbtn:hover{border-color:var(--cyan);color:var(--cyan)}
.search{padding:7px 12px;background:var(--card);border:1px solid var(--border);color:var(--white);font-family:'DM Sans';font-size:11px;border-radius:3px;outline:none;width:180px}
.search:focus{border-color:var(--cyan)}
.search::placeholder{color:var(--muted)}

/* LEAD CARDS */
.lead{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:18px;margin-bottom:14px;transition:.2s}
.lead:hover{border-color:var(--cyan);box-shadow:0 0 15px var(--cyan-glow)}
.lead.limpieza{border-left:3px solid var(--cyan)}
.lead.mantenimiento{border-left:3px solid var(--orange)}
.lead.insumos{border-left:3px solid var(--green)}

.lead-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.lead-empresa{font-family:'Syne',sans-serif;color:var(--cyan);font-size:15px;letter-spacing:1px}
.badges{display:flex;gap:6px;flex-wrap:wrap;align-items:center}

.badge{padding:3px 10px;border-radius:4px;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.badge-limpieza{background:rgba(0,229,255,.12);color:var(--cyan);border:1px solid rgba(0,229,255,.25)}
.badge-mant{background:rgba(249,115,22,.12);color:var(--orange);border:1px solid rgba(249,115,22,.25)}
.badge-insumos{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.25)}
.badge-pagado{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.25)}
.badge-pendiente{background:rgba(249,115,22,.12);color:var(--orange);border:1px solid rgba(249,115,22,.25)}
.badge-enviado{background:rgba(0,229,255,.12);color:var(--cyan);border:1px solid rgba(0,229,255,.25)}

.lead-info{font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:8px}
.lead-precio{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--cyan);margin:8px 0}
.lead-detalle{font-size:11px;color:var(--muted);margin-bottom:4px}
.lead-fecha{font-size:10px;color:#4b5563;margin-bottom:14px}

/* ACCIONES */
.acciones{display:flex;gap:8px;border-top:1px solid rgba(255,255,255,.05);padding-top:12px;flex-wrap:wrap}
.btn-a{flex:1;min-width:65px;padding:8px;background:transparent;border:1px solid var(--border);color:var(--white);font-size:10px;text-transform:uppercase;letter-spacing:1px;cursor:pointer;transition:.2s;border-radius:3px}
.btn-a:hover{border-color:var(--cyan);color:var(--cyan)}
.btn-wa{border-color:var(--cyan);color:var(--cyan)}
.btn-wa:hover{background:var(--cyan);color:var(--bg)}
.btn-ok{border-color:var(--green);color:var(--green)}
.btn-ok:hover{background:var(--green);color:var(--bg)}
.btn-del{border-color:var(--danger);color:var(--danger)}
.btn-del:hover{background:var(--danger);color:var(--bg)}
.sel-status{background:var(--bg);border:1px solid var(--border);color:var(--cyan);font-size:10px;padding:7px;text-transform:uppercase;border-radius:3px;cursor:pointer;outline:none}

/* NUEVA COTIZACIÓN */
.nueva-btn{
  width:100%;padding:14px;background:transparent;
  border:1px dashed rgba(0,229,255,.3);color:var(--cyan);
  font-family:'Syne',sans-serif;font-weight:700;font-size:13px;
  letter-spacing:1px;cursor:pointer;border-radius:6px;
  transition:.2s;margin-bottom:20px;
}
.nueva-btn:hover{background:rgba(0,229,255,.05);border-color:var(--cyan)}

/* MODAL NUEVA */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:2000;justify-content:center;align-items:center;backdrop-filter:blur(8px)}
.modal.open{display:flex}
.modal-box{background:#080c14;border:1px solid var(--cyan);padding:28px;border-radius:12px;width:95%;max-width:460px;max-height:90vh;overflow-y:auto}
.modal-title{font-family:'Syne',sans-serif;color:var(--cyan);font-size:16px;margin-bottom:20px}
.field{margin-bottom:12px;text-align:left}
.field label{font-size:10px;color:var(--cyan);text-transform:uppercase;display:block;margin-bottom:4px;letter-spacing:.08em}
.field input,.field select,.field textarea{width:100%;padding:9px 12px;background:rgba(255,255,255,.05);border:1px solid var(--border);color:white;border-radius:5px;font-family:'DM Sans';font-size:13px;outline:none}
.field input:focus,.field select:focus{border-color:var(--cyan)}
.field select option{background:#080c14}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.precio-preview{background:rgba(0,229,255,.05);border:1px solid rgba(0,229,255,.15);border-radius:6px;padding:12px;margin:12px 0;text-align:center}
.precio-preview .pp-val{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--cyan)}
.precio-preview .pp-lbl{font-size:10px;color:var(--muted);margin-top:3px}

.empty{text-align:center;padding:50px 20px;color:var(--muted)}

@media(max-width:600px){
  .stats{grid-template-columns:1fr 1fr}
  .acciones{flex-direction:column}
  .btn-a{width:100%}
  .field-row{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">MESAN SERVICIOS — CRM</div>
  <div class="tabs">
    <div class="tab active" onclick="setTab('recientes',this)">Recientes</div>
    <div class="tab" onclick="setTab('limpieza',this)">Limpieza</div>
    <div class="tab" onclick="setTab('mantenimiento',this)">Mantenimiento</div>
    <div class="tab" onclick="setTab('insumos',this)">Insumos</div>
    <div class="tab" onclick="setTab('pagados',this)">Pagados</div>
  </div>
</div>

<!-- STATS -->
<div class="stats">
  <div class="stat"><div class="stat-val" id="s-total">—</div><div class="stat-lbl">Total Leads</div></div>
  <div class="stat"><div class="stat-val" id="s-limpieza" style="color:var(--cyan)">—</div><div class="stat-lbl">Limpieza</div></div>
  <div class="stat"><div class="stat-val" id="s-mant" style="color:var(--orange)">—</div><div class="stat-lbl">Mantenimiento</div></div>
  <div class="stat"><div class="stat-val" id="s-revenue" style="color:var(--green)">—</div><div class="stat-lbl">Revenue MXN</div></div>
</div>

<!-- FILTROS -->
<div class="filtros">
  <button class="fbtn active" onclick="setFiltro('todos',this)">Todos</button>
  <button class="fbtn" onclick="setFiltro('limpieza',this)">🧹 Limpieza</button>
  <button class="fbtn" onclick="setFiltro('mantenimiento',this)">⚙️ Mantenimiento</button>
  <button class="fbtn" onclick="setFiltro('insumos',this)">📦 Insumos</button>
  <button class="fbtn" onclick="setFiltro('pagados',this)">✅ Pagados</button>
  <input type="text" class="search" id="search" placeholder="Buscar empresa..." oninput="render()">
</div>

<!-- NUEVA COTIZACIÓN -->
<button class="nueva-btn" onclick="abrirModal()">+ Nueva Cotización Manual</button>

<!-- LEADS -->
<div id="lead-container">
  <div class="empty">Cargando...</div>
</div>

<!-- MODAL NUEVA COTIZACIÓN -->
<div class="modal" id="modal-nueva">
  <div class="modal-box">
    <div class="modal-title">Nueva Cotización Manual</div>

    <div class="field">
      <label>Tipo de servicio</label>
      <select id="n-tipo" onchange="calcularPreview()">
        <option value="limpieza">🧹 Limpieza</option>
        <option value="mantenimiento">⚙️ Mantenimiento</option>
        <option value="insumos">📦 Insumos</option>
      </select>
    </div>

    <div class="field-row">
      <div class="field"><label>Empresa</label><input id="n-empresa" placeholder="Nombre empresa"></div>
      <div class="field"><label>Contacto</label><input id="n-contacto" placeholder="Nombre"></div>
    </div>

    <div class="field-row">
      <div class="field"><label>Teléfono</label><input id="n-tel" placeholder="+52 686..."></div>
      <div class="field"><label>Email</label><input id="n-email" placeholder="correo@..."></div>
    </div>

    <!-- LIMPIEZA -->
    <div id="campos-limpieza">
      <div class="field-row">
        <div class="field">
          <label>Zona</label>
          <select id="n-zona" onchange="calcularPreview()">
            <option value="frontera">Frontera — $440.62/día</option>
            <option value="interior">Interior — $248.93/día</option>
          </select>
        </div>
        <div class="field">
          <label>Sector</label>
          <select id="n-sector" onchange="calcularPreview()">
            <option value="gobierno">Gobierno 20%</option>
            <option value="industrial">Industrial 28%</option>
            <option value="corporativo">Corporativo 35%</option>
          </select>
        </div>
      </div>
      <div class="field-row">
        <div class="field"><label>Elementos</label><input type="number" id="n-elem" value="1" min="1" oninput="calcularPreview()"></div>
        <div class="field">
          <label>Turno</label>
          <select id="n-turno" onchange="calcularPreview()">
            <option value="1">1 turno</option>
            <option value="2">2 turnos</option>
            <option value="3">3 turnos</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Días/semana</label>
        <select id="n-dias" onchange="calcularPreview()">
          <option value="5">5 días</option>
          <option value="6" selected>6 días</option>
          <option value="7">7 días</option>
        </select>
      </div>
    </div>

    <!-- MANTENIMIENTO / INSUMOS -->
    <div id="campos-otros" style="display:none">
      <div class="field"><label>Descripción del servicio</label><textarea id="n-desc" rows="3" style="resize:none" placeholder="Describe el servicio requerido..."></textarea></div>
    </div>

    <div class="field">
      <label>Precio acordado (opcional)</label>
      <input type="number" id="n-precio-manual" placeholder="0">
    </div>

    <!-- PREVIEW PRECIO LIMPIEZA -->
    <div class="precio-preview" id="precio-preview">
      <div class="pp-val" id="pp-val">$0</div>
      <div class="pp-lbl">Total mensual estimado con IVA</div>
    </div>

    <div class="field">
      <label>Estado</label>
      <select id="n-estado">
        <option value="nuevo">Nuevo</option>
        <option value="enviado">Enviado</option>
        <option value="seguimiento">Seguimiento</option>
        <option value="cerrado">Cerrado</option>
      </select>
    </div>

    <button style="width:100%;padding:13px;background:var(--cyan);color:#000;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;border:none;border-radius:6px;cursor:pointer;margin-top:8px" onclick="guardarLead()">
      GUARDAR LEAD
    </button>
    <button style="width:100%;padding:10px;background:transparent;border:none;color:var(--muted);font-size:11px;cursor:pointer;margin-top:8px" onclick="cerrarModal()">
      Cancelar
    </button>
  </div>
</div>

<script>
// ═══ CONFIG ══════════════════════════════════════
const SMG = {frontera:440.62, interior:248.93};
const IVA = {frontera:0.08, interior:0.16};
const MARGENES = {gobierno:0.20, industrial:0.28, corporativo:0.35};

let leads = [];
let tabActual = 'recientes';
let filtroActual = 'todos';

const $ = id => document.getElementById(id);
const fmt = n => '$' + Math.round(n).toLocaleString('es-MX');

// ═══ INIT ════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  cargarLeads();
  calcularPreview();
});

function cargarLeads() {
  // Intentar cargar desde API
  fetch('https://mesan-servicios.onrender.com/crm/leads')
    .then(r => r.json())
    .then(data => {
      leads = data.leads || data || [];
      actualizarStats();
      render();
    })
    .catch(() => {
      // Demo leads si no hay API
      leads = [
        {id:1, tipo:'limpieza', empresa:'INDUSTRIAS DEL NORTE', contacto:'Ing. García', telefono:'6861234567', email:'garcia@norte.com', zona:'frontera', sector:'industrial', elementos:5, turnos:1, dias:6, precio:67450, estado:'enviado', pagado:false, fecha:new Date().toISOString()},
        {id:2, tipo:'mantenimiento', empresa:'OFICINAS CENTRO', contacto:'Lic. Ramos', telefono:'6869876543', email:'ramos@centro.com', desc:'Mantenimiento preventivo A/C y centros de carga', precio:8500, estado:'nuevo', pagado:false, fecha:new Date(Date.now()-86400000).toISOString()},
        {id:3, tipo:'insumos', empresa:'MAQUILA FRONTERA', contacto:'Karla López', telefono:'6865551234', email:'klopez@maquila.com', desc:'Pedido mensual: cloro, papel, bolsas', precio:3200, estado:'cerrado', pagado:true, fecha:new Date(Date.now()-172800000).toISOString()},
      ];
      actualizarStats();
      render();
    });
}

// ═══ STATS ═══════════════════════════════════════
function actualizarStats() {
  $('s-total').textContent = leads.length;
  $('s-limpieza').textContent = leads.filter(l => l.tipo === 'limpieza').length;
  $('s-mant').textContent = leads.filter(l => l.tipo === 'mantenimiento').length;
  const rev = leads.filter(l => l.pagado).reduce((s,l) => s + (l.precio||0), 0);
  $('s-revenue').textContent = rev > 0 ? fmt(rev) : '$0';
}

// ═══ TAB & FILTRO ════════════════════════════════
function setTab(tab, el) {
  tabActual = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}
function setFiltro(f, el) {
  filtroActual = f;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}

// ═══ RENDER ══════════════════════════════════════
function render() {
  const container = $('lead-container');
  const busqueda = $('search').value.toLowerCase();

  let lista = [...leads];

  // Tab
  if (tabActual === 'recientes') lista.sort((a,b) => new Date(b.fecha) - new Date(a.fecha));
  if (tabActual === 'pagados') lista = lista.filter(l => l.pagado);
  if (tabActual === 'limpieza') lista = lista.filter(l => l.tipo === 'limpieza');
  if (tabActual === 'mantenimiento') lista = lista.filter(l => l.tipo === 'mantenimiento');
  if (tabActual === 'insumos') lista = lista.filter(l => l.tipo === 'insumos');

  // Filtro
  if (filtroActual === 'pagados') lista = lista.filter(l => l.pagado);
  else if (filtroActual === 'limpieza') lista = lista.filter(l => l.tipo === 'limpieza');
  else if (filtroActual === 'mantenimiento') lista = lista.filter(l => l.tipo === 'mantenimiento');
  else if (filtroActual === 'insumos') lista = lista.filter(l => l.tipo === 'insumos');

  // Búsqueda
  if (busqueda) lista = lista.filter(l => (l.empresa||'').toLowerCase().includes(busqueda));

  if (lista.length === 0) {
    container.innerHTML = '<div class="empty">📭 Sin leads en esta vista.</div>';
    return;
  }

  container.innerHTML = lista.map(l => renderCard(l)).join('');
}

function renderCard(l) {
  const fecha = l.fecha ? new Date(l.fecha).toLocaleDateString('es-MX',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';
  const tipoCls = l.tipo || 'limpieza';
  const badgeTipo = l.tipo === 'limpieza' ? '<span class="badge badge-limpieza">🧹 Limpieza</span>'
    : l.tipo === 'mantenimiento' ? '<span class="badge badge-mant">⚙️ Mantenimiento</span>'
    : '<span class="badge badge-insumos">📦 Insumos</span>';
  const badgePago = l.pagado ? '<span class="badge badge-pagado">✅ Pagado</span>' : '';
  const badgeEst = l.estado === 'enviado' ? '<span class="badge badge-enviado">Enviado</span>'
    : l.estado === 'cerrado' ? '<span class="badge badge-pagado">Cerrado</span>'
    : '<span class="badge badge-pendiente">Nuevo</span>';

  // Detalle según tipo
  let detalle = '';
  if (l.tipo === 'limpieza') {
    detalle = `<div class="lead-detalle">${l.elementos||1} elemento(s) · ${l.zona==='frontera'?'Frontera':'Interior'} · ${l.turnos||1} turno(s) · ${l.dias||6} días/sem · Sector ${l.sector||'—'}</div>`;
  } else {
    detalle = l.desc ? `<div class="lead-detalle">${l.desc}</div>` : '';
  }

  return `
  <div class="lead ${tipoCls}" id="card-${l.id}">
    <div class="lead-top">
      <div class="lead-empresa">${l.empresa || 'Sin nombre'}</div>
      <div class="badges">${badgeTipo}${badgePago}${badgeEst}</div>
    </div>
    <div class="lead-info">
      ${l.contacto ? l.contacto + '<br>' : ''}
      ${l.email ? l.email + '<br>' : ''}
      ${l.telefono ? l.telefono : ''}
    </div>
    ${detalle}
    <div class="lead-precio">${l.precio ? fmt(l.precio) + ' MXN/mes' : '—'}</div>
    <div class="lead-fecha">📅 ${fecha}</div>
    <div class="acciones">
      <button class="btn-a btn-wa" onclick="abrirWA('${l.telefono||''}','${(l.empresa||'').replace(/'/g,"\\'")}','${l.tipo||''}','${l.precio||0}')">WhatsApp</button>
      <button class="btn-a" onclick="llamar('${l.telefono||''}')">Llamar</button>
      ${!l.pagado ? `<button class="btn-a btn-ok" onclick="marcarPagado(${l.id})">✓ Pagado</button>` : ''}
      <button class="btn-a btn-del" onclick="eliminar(${l.id})">✕</button>
      <select class="sel-status" onchange="cambiarEstado(${l.id},this.value)">
        <option ${l.estado==='nuevo'?'selected':''}>Nuevo</option>
        <option ${l.estado==='enviado'?'selected':''}>Enviado</option>
        <option ${l.estado==='seguimiento'?'selected':''}>Seguimiento</option>
        <option ${l.estado==='cerrado'?'selected':''}>Cerrado</option>
        <option ${l.estado==='perdido'?'selected':''}>Perdido</option>
      </select>
    </div>
  </div>`;
}

// ═══ ACCIONES ════════════════════════════════════
function abrirWA(tel, empresa, tipo, precio) {
  if (!tel) { alert('Sin teléfono'); return; }
  const num = tel.replace(/\D/g,'');
  const serv = tipo === 'limpieza' ? 'limpieza' : tipo === 'mantenimiento' ? 'mantenimiento preventivo' : 'insumos';
  const msg = encodeURIComponent(
    `Hola ${empresa}, somos MESAN Servicios.\n\n` +
    `Le contactamos sobre su solicitud de ${serv}.\n` +
    (precio ? `Propuesta: ${fmt(parseInt(precio))} MXN\n\n` : '\n') +
    `¿Tiene disponibilidad para revisar los detalles?`
  );
  window.open(`https://wa.me/52${num}?text=${msg}`, '_blank');
}

function llamar(tel) {
  if (!tel) { alert('Sin teléfono'); return; }
  window.location.href = 'tel:' + tel;
}

function marcarPagado(id) {
  const l = leads.find(x => x.id === id);
  if (l) { l.pagado = true; l.estado = 'cerrado'; }
  actualizarStats(); render();
  fetch('https://mesan-servicios.onre
